<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷよぷよスマホ対応</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align:center;
  background:#222;
  color:white;
  font-family:sans-serif;
}

canvas {
  background:#111;
  margin:10px;
}

/* ボタンUI */
.controls {
  margin-top:10px;
}

button {
  font-size:20px;
  padding:15px 25px;
  margin:5px;
  border-radius:10px;
  border:none;
}

/* 押しやすく */
button:active {
  background:#888;
}
</style>
</head>

<body>

<h2>ぷよぷよ（スマホ対応）</h2>

<canvas id="game" width="240" height="480"></canvas>

<div class="controls">
  <button onclick="move(-1,0)">←</button>
  <button onclick="rotate()">⟳</button>
  <button onclick="move(1,0)">→</button>
</div>

<div class="controls">
  <button onclick="drop()">↓</button>
</div>

<script>
const COLS=6, ROWS=12, SIZE=40;
const colors=["","red","blue","green","yellow"];

let field = Array.from({length:ROWS},()=>Array(COLS).fill(0));
let puyo = newPuyo();

function rand(){ return Math.floor(Math.random()*4)+1; }

function newPuyo(){
  return {x:2,y:0,rot:0,color:rand(),subColor:rand()};
}

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function draw(){
  ctx.clearRect(0,0,240,480);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(field[y][x]) drawCircle(x,y,field[y][x]);
    }
  }

  drawPuyo();
}

function drawCircle(x,y,c){
  ctx.fillStyle=colors[c];
  ctx.beginPath();
  ctx.arc(x*SIZE+20,y*SIZE+20,18,0,Math.PI*2);
  ctx.fill();
}

function drawPuyo(){
  drawCircle(puyo.x,puyo.y,puyo.color);
  let dx=[0,1,0,-1][puyo.rot];
  let dy=[-1,0,1,0][puyo.rot];
  drawCircle(puyo.x+dx,puyo.y+dy,puyo.subColor);
}

function canMove(x,y,rot){
  let dx=[0,1,0,-1][rot];
  let dy=[-1,0,1,0][rot];

  let pos=[[x,y],[x+dx,y+dy]];

  return pos.every(([px,py])=>
    px>=0&&px<COLS&&py<ROWS&&(py<0||field[py][px]==0)
  );
}

function move(dx,dy){
  if(canMove(puyo.x+dx,puyo.y+dy,puyo.rot)){
    puyo.x+=dx;
    puyo.y+=dy;
  }
}

function rotate(){
  let r=(puyo.rot+1)%4;
  if(canMove(puyo.x,puyo.y,r)) puyo.rot=r;
}

function drop(){
  if(canMove(puyo.x,puyo.y+1,puyo.rot)){
    puyo.y++;
  }else{
    fix();
  }
}

function fix(){
  let dx=[0,1,0,-1][puyo.rot];
  let dy=[-1,0,1,0][puyo.rot];

  let blocks = [
    {x:puyo.x, y:puyo.y, c:puyo.color},
    {x:puyo.x+dx, y:puyo.y+dy, c:puyo.subColor}
  ];

  blocks.forEach(b=>{
    if(b.y>=0) field[b.y][b.x]=b.c;
  });

  applyGravity();
  clearPuyo();
  puyo=newPuyo();
}

function applyGravity(){
  let moved;
  do{
    moved=false;
    for(let y=ROWS-2;y>=0;y--){
      for(let x=0;x<COLS;x++){
        if(field[y][x] && field[y+1][x]==0){
          field[y+1][x]=field[y][x];
          field[y][x]=0;
          moved=true;
        }
      }
    }
  }while(moved);
}

function clearPuyo(){
  let visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let removed=false;

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(field[y][x]&&!visited[y][x]){
        let group=[];
        dfs(x,y,field[y][x],group,visited);

        if(group.length>=4){
          group.forEach(([gx,gy])=>field[gy][gx]=0);
          removed=true;
        }
      }
    }
  }

  if(removed){
    applyGravity();
    setTimeout(clearPuyo,200);
  }
}

function dfs(x,y,c,group,visited){
  if(x<0||x>=COLS||y<0||y>=ROWS) return;
  if(visited[y][x]||field[y][x]!=c) return;

  visited[y][x]=true;
  group.push([x,y]);

  dfs(x+1,y,c,group,visited);
  dfs(x-1,y,c,group,visited);
  dfs(x,y+1,c,group,visited);
  dfs(x,y-1,c,group,visited);
}

/* キーボード対応も残す */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move(-1,0);
  if(e.key==="ArrowRight") move(1,0);
  if(e.key==="ArrowDown") drop();
  if(e.key==="ArrowUp") rotate();
});

/* ゲームループ */
setInterval(()=>{
  drop();
  draw();
},500);

draw();
</script>

</body>
</html>
